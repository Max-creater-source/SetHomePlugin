# ──────────────────────────────────────────────────────────────
#  GENERAL SETTINGS
# ──────────────────────────────────────────────────────────────
general:
  # Available languages: de, en, fr, es, it, pl, nl, pt, ru, zh, ja
  language: "en"

  # Default max homes for players without a specific LuckPerms rank configured below
  default-max-homes: 3

  # Teleport delay in seconds (0 = instant)
  teleport-delay: 3

  # Cancel teleport on move?
  cancel-on-move: true

  # Play sounds?
  sounds:
    enabled: true
    teleport: "ENTITY_ENDERMAN_TELEPORT"
    set-home: "BLOCK_ENCHANTMENT_TABLE_USE"
    delete-home: "ENTITY_ITEM_BREAK"
    open-gui: "BLOCK_CHEST_OPEN"
    error: "ENTITY_VILLAGER_NO"

  # Particle effects on teleport?
  particles:
    enabled: true
    type: "PORTAL"
    count: 30

# ──────────────────────────────────────────────────────────────
#  LUCKPERMS RANK → HOME LIMIT MAPPING
#  Format:  rank-name: max-homes
#  The plugin checks ranks top-down and uses the first match.
# ──────────────────────────────────────────────────────────────
rank-homes:
  owner: 999
  admin: 50
  moderator: 20
  vip-plus: 15
  vip: 10
  premium: 7
  member: 5
  default: 3

# ──────────────────────────────────────────────────────────────
#  GUI SETTINGS
# ──────────────────────────────────────────────────────────────
gui:
  rows: 6  # 1-6 rows (multiples of 9 slots)

  # Item for homes in GUI
  home-item: "LIME_BED"

  # Item shown when slot is empty
  filler-item: "GRAY_STAINED_GLASS_PANE"

  # Navigation items
  prev-page-item: "ARROW"
  next-page-item: "ARROW"
  close-item: "BARRIER"

  # Show home coordinates in lore?
  show-coordinates: true

  # Show world name in lore?
  show-world: true

  # Confirm GUI settings
  confirm:
    enabled: true
    confirm-item: "LIME_CONCRETE"
    cancel-item: "RED_CONCRETE"

# ──────────────────────────────────────────────────────────────
#  DATABASE / STORAGE
#  Type: yaml (flat-file) or mysql
# ──────────────────────────────────────────────────────────────
storage:
  type: "yaml"
  mysql:
    host: "localhost"
    port: 3306
    database: "sethomeplugin"
    username: "root"
    password: "password"
    table-prefix: "shp_"

